name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  streamlit-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Roboflow connection
      env:
        ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
      run: |
        python -c "from roboflow import Roboflow; print('✅ Roboflow API OK')"
    
    - name: Run Streamlit app test
      run: |
        streamlit run app/app.py --logger.level=debug &
        sleep 10
        curl http://localhost:8501 || true
